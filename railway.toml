[build]
builder = "NIXPACKS"
buildCommand = "pnpm install && pnpm run build && npx tsx packages/server/src/db/migrations/fix-duplicate-slugs.ts && cd packages/server && yes | npx drizzle-kit push && cd ../.. && pnpm --filter @culinaire/server db:seed"

[deploy]
startCommand = "node packages/server/dist/index.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
