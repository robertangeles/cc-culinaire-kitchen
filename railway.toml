[build]
builder = "NIXPACKS"
buildCommand = "pnpm install && pnpm run build"

[deploy]
startCommand = "npx tsx packages/server/src/db/migrations/fix-duplicate-slugs.ts && cd packages/server && npx drizzle-kit push --force && cd ../.. && pnpm --filter @culinaire/server db:seed && node packages/server/dist/index.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
